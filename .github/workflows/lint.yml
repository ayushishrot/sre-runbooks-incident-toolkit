name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
      - name: python compile
        run: python3 -m py_compile scripts/error-budget.py
      - name: validate kafka dashboard json
        run: python3 -c "import json; json.load(open('monitoring/kafka/grafana-dashboard.json'))"
      - name: yaml well-formed
        run: |
          pip install pyyaml
          python3 -c "import yaml; yaml.safe_load(open('monitoring/kafka/prometheus-rules.yaml'))"
